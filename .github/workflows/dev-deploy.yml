name: Dev Deploy

on:
  push:
    branches-ignore: [master]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set branch name
        id: branch
        run: echo "name=$(echo ${{ github.ref_name }} | tr '/' '-')" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/korjavin/substracker:${{ steps.branch.outputs.name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update deploy-dev branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin deploy-dev 2>/dev/null || true
          git checkout deploy-dev 2>/dev/null || git checkout --orphan deploy-dev
          git reset --hard || true
          sed -i "s|ghcr.io/korjavin/substracker:.*|ghcr.io/korjavin/substracker:${{ steps.branch.outputs.name }}|g" docker-compose.yml || true
          git add docker-compose.yml
          git commit -m "dev-deploy: ${{ steps.branch.outputs.name }}@${{ github.sha }}" --allow-empty
          git push origin deploy-dev --force

      - name: Trigger Portainer dev webhook
        if: ${{ secrets.PORTAINER_WEBHOOK_DEV != '' }}
        run: curl -s -X POST "${{ secrets.PORTAINER_WEBHOOK_DEV }}"
