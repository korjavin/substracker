name: Deploy

on:
  push:
    branches: [master]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/korjavin/substracker:latest
            ghcr.io/korjavin/substracker:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update deploy branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin deploy 2>/dev/null || true
          git checkout deploy 2>/dev/null || git checkout --orphan deploy
          git reset --hard || true
          # Update image tag in docker-compose.yml
          sed -i "s|ghcr.io/korjavin/substracker:.*|ghcr.io/korjavin/substracker:${{ github.sha }}|g" docker-compose.yml || true
          git add docker-compose.yml
          git commit -m "deploy: ${{ github.sha }}" --allow-empty
          git push origin deploy --force

      - name: Trigger Portainer webhook
        env:
          PORTAINER_WEBHOOK: ${{ secrets.PORTAINER_WEBHOOK }}
        run: |
          if [ -n "$PORTAINER_WEBHOOK" ]; then
            curl -s -X POST "$PORTAINER_WEBHOOK"
          else
            echo "No webhook configured"
          fi
