services:
  app:
    image: ghcr.io/korjavin/substracker:latest
    container_name: substracker
    expose:
      - "5454"
    networks:
      - traefik
    environment:
      - PORT=5454
      - DB_PATH=/data/substracker.db
      - TG_BOT_TOKEN=${TG_BOT_TOKEN:-}
      - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY:-}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY:-}
      - VAPID_SUBJECT=${VAPID_SUBJECT:-mailto:admin@example.com}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.substracker.rule=Host(`${DNS_NAME}`)"
      - "traefik.http.routers.substracker.entrypoints=websecure"
      - "traefik.http.routers.substracker.tls.certresolver=myresolver"
      - "traefik.http.services.substracker.loadbalancer.server.port=5454"
    volumes:
      - data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5454/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  data:

networks:
  traefik:
    external: true
    name: ${NETWORK_NAME}
